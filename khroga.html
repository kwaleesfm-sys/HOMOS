<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOMOS LUXURY | إمبراطورية الزجاج</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --gold: #FFD700;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --bg: #030303;
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a00 0%, #030303 80%);
            color: #fff;
            margin: 0;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* تأثير الزجاج */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        /* شاشة الدخول */
        #auth-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 25px;
        }

        .brand-glow {
            font-size: 4rem; font-weight: 800; color: #fff;
            text-shadow: 0 0 20px var(--gold);
            letter-spacing: 5px; margin-bottom: 10px;
        }

        .auth-card { width: 100%; max-width: 400px; padding: 30px; text-align: center; }

        input {
            width: 100%; padding: 15px; margin: 12px 0;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 15px; color: #fff; outline: none;
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 15px;
            font-weight: 800; cursor: pointer; margin: 10px 0;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #fff); color: #000; }
        .btn-glass { background: var(--glass); color: var(--gold); border: 1px solid var(--gold); }

        /* التطبيق */
        #main-app { display: none; padding: 15px; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px 0; }
        
        .tab-content { display: none; animation: slideUp 0.5s ease; }
        .tab-content.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* كروت المنتجات الزجاجية */
        .product-card {
            margin-bottom: 25px; padding: 15px; position: relative;
            overflow: hidden; border: 1px solid var(--glass-border);
        }
        .product-card:hover { border-color: var(--gold); transform: scale(1.02); }
        .product-img { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; }
        .price-tag { font-size: 1.5rem; font-weight: 800; color: var(--gold); margin: 10px 0; }

        /* لوحة التحكم والرفع */
        .upload-section { padding: 25px; margin-bottom: 30px; border: 1px dashed var(--gold); }
        .request-box { 
            background: rgba(255,215,0,0.05); border-right: 5px solid var(--gold); 
            padding: 15px; border-radius: 10px; margin-bottom: 15px;
        }

        /* شريط التنقل السفلي */
        .bottom-nav {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            height: 70px; display: flex; justify-content: space-around;
            align-items: center; z-index: 2000; border-radius: 25px;
        }
        .nav-item { color: rgba(255,255,255,0.4); text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--gold); transform: translateY(-5px); }
        .nav-item i { font-size: 1.5rem; display: block; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="brand-glow">HOMOS</div>
        <div class="glass auth-card">
            <h2 style="margin-top: 0;">تسجيل دخول</h2>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button class="btn btn-gold" onclick="window.login()">دخول</button>
            <button class="btn btn-glass" onclick="window.signup()">عضوية جديدة</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <h1 style="color: var(--gold); margin: 0; font-size: 2.2rem;">HOMOS GLOBAL</h1>
            <p id="user-info" style="color: #666; font-size: 0.8rem;"></p>
        </div>

        <div id="shop" class="tab-content active">
            <div id="products-list"></div>
        </div>

        <div id="add" class="tab-content">
            <div class="glass upload-section">
                <h2 style="color: var(--gold); text-align: center;">نشر منتج جديد</h2>
                <p style="text-align: center; font-size: 0.8rem; color: #888;">ملاحظة: سيتم مراجعة منتجك من قبل الإدارة قبل النشر</p>
                <input type="text" id="p-name" placeholder="ماذا تريد أن تبيع؟">
                <input type="number" id="p-price" placeholder="السعر المطلوب">
                <input type="file" accept="image/*" style="margin: 15px 0;" onchange="window.handleImg(event)">
                <button class="btn btn-gold" onclick="window.sendToReview()">إرسال للمراجعة</button>
            </div>
        </div>

        <div id="admin" class="tab-content">
            <h2 style="color: var(--gold);">لوحة تحكم المدير</h2>
            <div id="admin-requests"></div>
            <button class="btn btn-glass" style="color: #ff4444; border-color: #ff4444;" onclick="window.logout()">خروج</button>
        </div>

        <nav class="glass bottom-nav">
            <div class="nav-item active" onclick="window.tab('shop', this)"><span>🛒</span><small>المتجر</small></div>
            <div class="nav-item" onclick="window.tab('add', this)"><span>➕</span><small>أنشر</small></div>
            <div id="admin-btn" class="nav-item" style="display: none;" onclick="window.tab('admin', this)"><span>👑</span><small>المدير</small></div>
        </nav>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
      authDomain: "fir-c3e88.firebaseapp.com",
      databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
      projectId: "fir-c3e88",
      storageBucket: "fir-c3e88.firebasestorage.app",
      messagingSenderId: "202130175288",
      appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const ADMIN = "ahmedfouad01278837444@gmail.com";
    let imgData = "";

    // التحقق من الجلسة
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-info').innerText = "متصل كـ: " + user.email;
            if(user.email === ADMIN) { document.getElementById('admin-btn').style.display = 'block'; fetchAdminData(); }
            fetchLiveShop();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    // تسجيل الدخول
    window.login = () => signInWithEmailAndPassword(auth, email.value, password.value).catch(e => Swal.fire('خطأ', 'بيانات غير صحيحة', 'error'));
    window.signup = () => createUserWithEmailAndPassword(auth, email.value, password.value).catch(e => Swal.fire('خطأ', e.message, 'error'));
    window.logout = () => signOut(auth);

    // تحويل الصورة Base64
    window.handleImg = (e) => {
        const r = new FileReader();
        r.onload = () => imgData = r.result;
        r.readAsDataURL(e.target.files[0]);
    };

    // إرسال للمراجعة (متاح للجميع)
    window.sendToReview = () => {
        const n = document.getElementById('p-name').value;
        const p = document.getElementById('p-price').value;
        if(!n || !p || !imgData) return Swal.fire('عفواً', 'أكمل بيانات المنتج والصورة', 'warning');

        push(ref(db, 'pending'), { name: n, price: p, img: imgData, owner: auth.currentUser.email });
        Swal.fire('تم الإرسال', 'طلبك قيد المراجعة من HOMOS الآن', 'success');
        document.getElementById('p-name').value = ''; document.getElementById('p-price').value = '';
    };

    // جلب المتجر المعتمد
    function fetchLiveShop() {
        onValue(ref(db, 'approved'), (s) => {
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            const val = s.val();
            if(val) {
                Object.keys(val).reverse().forEach(id => {
                    const i = val[id];
                    list.innerHTML += `
                        <div class="glass product-card">
                            <img src="${i.img}" class="product-img">
                            <h3>${i.name}</h3>
                            <div class="price-tag">${i.price} ج.م</div>
                            <button class="btn btn-gold" onclick="window.chat('${i.name}')">شراء الآن</button>
                        </div>`;
                });
            } else { list.innerHTML = '<p style="text-align:center; opacity:0.5;">المتجر فارغ حالياً</p>'; }
        });
    }

    // جلب طلبات المدير
    function fetchAdminData() {
        onValue(ref(db, 'pending'), (s) => {
            const list = document.getElementById('admin-requests');
            list.innerHTML = '';
            const val = s.val();
            if(val) {
                Object.keys(val).forEach(id => {
                    const i = val[id];
                    list.innerHTML += `
                        <div class="request-box glass">
                            <p><b>المنتج:</b> ${i.name} | <b>السعر:</b> ${i.price}</p>
                            <p style="font-size:0.7rem; opacity:0.6;">من: ${i.owner}</p>
                            <button class="btn btn-gold" style="padding:5px; font-size:0.8rem;" onclick="window.approve('${id}', ${JSON.stringify(i).replace(/"/g, '&quot;')})">موافقة ونشر</button>
                            <button class="btn btn-glass" style="padding:5px; font-size:0.8rem; border-color:red; color:red;" onclick="window.del('${id}')">حذف</button>
                        </div>`;
                });
            }
        });
    }

    window.approve = (id, data) => {
        push(ref(db, 'approved'), data);
        remove(ref(db, `pending/${id}`));
        Swal.fire('تم!', 'المنتج متاح الآن للجميع', 'success');
    };

    window.del = (id) => remove(ref(db, `pending/${id}`));

    window.tab = (id, el) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    };

    window.chat = (n) => window.open(`https://wa.me/201016553764?text=${encodeURIComponent('أريد شراء: '+n)}`, '_blank');
</script>
</body>
</html>
