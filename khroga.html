<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS Studio | النسخة المستقرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .homos-loader {
            width: 60px; height: 60px;
            border: 5px solid #a78bfa; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-[#050810] text-white min-h-screen font-sans">

    <nav class="p-6 border-b border-white/5 bg-black/20 backdrop-blur-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-cyan-400">HOMOS.Studio</h1>
            <span class="text-[10px] bg-white/10 px-2 py-1 rounded border border-white/10 uppercase tracking-widest">Ultra Stable</span>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-12">
        <div class="bg-[#0f172a] rounded-3xl p-8 border border-white/5 shadow-2xl">
            <div class="space-y-4">
                <textarea id="promptInput" rows="3" 
                    class="w-full bg-[#050810] border border-white/10 rounded-2xl p-4 text-lg outline-none focus:border-violet-500 transition-colors"
                    placeholder="اكتب وصف الصورة بالإنجليزية هنا..."></textarea>
                
                <button onclick="generate()" id="mainBtn"
                    class="w-full bg-gradient-to-r from-violet-600 to-cyan-600 hover:from-violet-500 hover:to-cyan-500 py-4 rounded-2xl font-bold text-lg shadow-lg transition-all active:scale-95">
                    توليد الصورة الآن
                </button>
            </div>

            <div id="displayArea" class="mt-10 hidden text-center fade-in">
                <div id="loaderBox" class="py-12">
                    <span class="homos-loader"></span>
                    <p class="mt-4 text-violet-400 animate-pulse font-medium">HOMOS يقوم بمعالجة خيالك...</p>
                </div>
                
                <div id="imageBox" class="hidden relative group">
                    <img id="resultImg" src="" class="w-full rounded-2xl border-4 border-black shadow-2xl transition-all duration-700">
                    <div class="mt-4 flex gap-3">
                        <button onclick="downloadImg()" class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl text-sm border border-white/10">حفظ الصورة</button>
                        <button onclick="window.location.reload()" class="px-6 bg-red-500/10 text-red-400 py-3 rounded-xl text-sm border border-red-500/20">مسح</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function generate() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) return alert("من فضلك اكتب وصفاً أولاً");

            const btn = document.getElementById('mainBtn');
            const displayArea = document.getElementById('displayArea');
            const loaderBox = document.getElementById('loaderBox');
            const imageBox = document.getElementById('imageBox');
            const resultImg = document.getElementById('resultImg');

            // تجهيز الواجهة
            btn.disabled = true;
            btn.style.opacity = "0.5";
            displayArea.classList.remove('hidden');
            loaderBox.classList.remove('hidden');
            imageBox.classList.add('hidden');

            // الحل الجذري للخطأ: التشفير الصحيح وإضافة Seed عشوائي
            const safePrompt = encodeURIComponent(prompt);
            const seed = Math.floor(Math.random() * 999999);
            // استخدمنا العرض 512 لضمان استجابة سريعة جداً وتجنب "التايم أوت"
            const url = `https://image.pollinations.ai/prompt/${safePrompt}?width=512&height=512&seed=${seed}&model=flux&nologo=true`;

            // اختبار تحميل الصورة
            const tempImg = new Image();
            tempImg.src = url;

            tempImg.onload = () => {
                resultImg.src = url;
                loaderBox.classList.add('hidden');
                imageBox.classList.remove('hidden');
                btn.disabled = false;
                btn.style.opacity = "1";
            };

            tempImg.onerror = () => {
                // محاولة أخيرة في حال فشل الرابط الأول بموديل أبسط
                console.log("Retrying with simple model...");
                resultImg.src = `https://image.pollinations.ai/prompt/${safePrompt}?width=512&height=512&seed=${seed}`;
                
                // إذا فشل تماماً بعد 5 ثوانٍ
                setTimeout(() => {
                    if (imageBox.classList.contains('hidden')) {
                        alert("عذراً، الخادم مشغول حالياً. حاول تقصير الوصف أو المحاولة بعد ثوانٍ.");
                        btn.disabled = false;
                        btn.style.opacity = "1";
                        displayArea.classList.add('hidden');
                    }
                }, 8000);
            };
        }

        function downloadImg() {
            const url = document.getElementById('resultImg').src;
            const a = document.createElement('a');
            a.href = url;
            a.download = `HOMOS_Studio_${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
