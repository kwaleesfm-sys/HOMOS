<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOMOS GLOBAL APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --gold: #FFD700;
            --bg: #050505;
            --card-bg: #151515;
            --nav-bg: #111111;
            --text: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        
        body {
            background-color: var(--bg); color: var(--text); margin: 0; padding: 0;
            padding-bottom: 80px;
        }

        /* شاشة تسجيل الدخول */
        #auth-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 20px; background: linear-gradient(180deg, #111, #000);
        }
        
        .brand-logo { font-size: 3rem; font-weight: 900; color: var(--gold); letter-spacing: 3px; margin-bottom: 30px; }
        
        .auth-input {
            width: 100%; max-width: 350px; padding: 15px; margin: 10px 0;
            background: #222; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 1rem;
        }
        
        .auth-input:focus { border-color: var(--gold); outline: none; }
        
        .btn {
            width: 100%; max-width: 350px; padding: 15px; margin: 10px 0;
            border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }

        /* التطبيق الرئيسي */
        #main-app { display: none; }
        
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* كروت المنتجات */
        .product-card { background: var(--card-bg); border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; background: #222; }
        .product-title { font-size: 1.2rem; margin: 0 0 5px; }
        .product-desc { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
        .product-price { color: var(--gold); font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; }

        /* الإدارة */
        .admin-form { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px dashed var(--gold); }
        .file-upload-wrapper { position: relative; width: 100%; height: 150px; border: 2px dashed #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #888; margin: 15px 0; cursor: pointer; overflow: hidden; }
        .file-upload-wrapper img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; }
        .file-upload-wrapper input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        /* الشريط السفلي */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg);
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #333; z-index: 1000;
        }
        .nav-item { color: #888; text-align: center; cursor: pointer; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="brand-logo">HOMOS</div>
        <p style="color: #888; margin-bottom: 20px;">منصة الأعمال والاستثمار</p>
        <input type="email" id="email" class="auth-input" placeholder="البريد الإلكتروني">
        <input type="password" id="password" class="auth-input" placeholder="كلمة المرور">
        <button class="btn btn-gold" onclick="window.loginUser()">دخول</button>
        <button class="btn btn-outline" onclick="window.signupUser()">إنشاء حساب جديد</button>
    </div>

    <div id="main-app">
        <div class="header">
            <h2 style="margin: 0; color: var(--gold);">HOMOS GLOBAL</h2>
            <p id="user-email" style="font-size: 0.8rem; color: #888; margin: 5px 0 0;"></p>
        </div>

        <div id="shop" class="tab-content active">
            <h3 style="border-bottom: 2px solid var(--gold); padding-bottom: 10px; display: inline-block;">المتجر الإلكتروني</h3>
            <div id="products-container">
                </div>
        </div>

        <div id="finance" class="tab-content">
            <div class="product-card" style="text-align: center;">
                <h2 style="color: var(--gold);">استثمر أموالك</h2>
                <p>شراء أسهم تجارية في منصة HOMOS بعوائد ممتازة.</p>
                <button class="btn btn-gold" onclick="window.openWhatsApp('invest')">تواصل للاستثمار</button>
            </div>
            <div class="product-card" style="text-align: center;">
                <h2 style="color: var(--gold);">طلب قرض / تمويل</h2>
                <p>تمويل فوري للمشتريات بضمان البطاقة.</p>
                <button class="btn btn-outline" onclick="window.openWhatsApp('loan')">تواصل لطلب تمويل</button>
            </div>
        </div>

        <div id="admin" class="tab-content">
            <div class="admin-form">
                <h3 style="color: var(--gold); text-align: center;">إضافة منتج للمتجر</h3>
                <input type="text" id="p-name" class="auth-input" placeholder="اسم المنتج">
                <input type="text" id="p-desc" class="auth-input" placeholder="وصف المنتج">
                <input type="number" id="p-price" class="auth-input" placeholder="السعر (ج.م)">
                
                <div class="file-upload-wrapper">
                    <span id="upload-text">اضغط لرفع صورة المنتج</span>
                    <img id="preview-img" src="">
                    <input type="file" id="p-file" accept="image/*" onchange="window.encodeImage(event)">
                </div>

                <button class="btn btn-gold" onclick="window.uploadProduct()">نشر المنتج الآن</button>
                <button class="btn btn-outline" style="border-color: #ff4444; color: #ff4444;" onclick="window.logoutUser()">تسجيل الخروج</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="window.switchTab('shop', this)">
                <span class="nav-icon">🛒</span><span>المتجر</span>
            </div>
            <div class="nav-item" onclick="window.switchTab('finance', this)">
                <span class="nav-icon">💰</span><span>التمويل</span>
            </div>
            <div class="nav-item" onclick="window.switchTab('admin', this)">
                <span class="nav-icon">⚙️</span><span>الإدارة</span>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // بيانات مشروعك الحقيقية
    const firebaseConfig = {
      apiKey: "AIzaSyAhg6oTG1EJ44ST1zkkeYvKpfLMD2JDV3M",
      authDomain: "fir-c3e88.firebaseapp.com",
      databaseURL: "https://fir-c3e88-default-rtdb.firebaseio.com",
      projectId: "fir-c3e88",
      storageBucket: "fir-c3e88.firebasestorage.app",
      messagingSenderId: "202130175288",
      appId: "1:202130175288:web:0d7ad99c3c828501b4fdcd",
      measurementId: "G-J47JVNC93Q"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const MY_PHONE = "201016553764";
    let currentBase64 = "";

    // 1. نظام المصادقة
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-email').innerText = "مرحباً: " + user.email;
            fetchProducts(); 
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    window.signupUser = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        createUserWithEmailAndPassword(auth, e, p)
            .then(() => Swal.fire('تم', 'تم إنشاء الحساب بنجاح', 'success'))
            .catch(err => Swal.fire('خطأ', err.message, 'error'));
    };

    window.loginUser = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => Swal.fire('خطأ', 'تأكد من البريد وكلمة المرور', 'error'));
    };

    window.logoutUser = () => signOut(auth);

    // 2. تحويل الصورة إلى Base64
    window.encodeImage = (event) => {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentBase64 = e.target.result;
                const preview = document.getElementById('preview-img');
                preview.src = currentBase64;
                preview.style.display = 'block';
                document.getElementById('upload-text').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    };

    // 3. رفع المنتج إلى Firebase Realtime Database
    window.uploadProduct = () => {
        const name = document.getElementById('p-name').value;
        const desc = document.getElementById('p-desc').value;
        const price = document.getElementById('p-price').value;

        if(!name || !price || !currentBase64) {
            Swal.fire('تنبيه', 'يجب إدخال الاسم والسعر واختيار صورة', 'warning');
            return;
        }

        const productRef = ref(db, 'products');
        push(productRef, {
            name: name,
            desc: desc,
            price: price,
            image: currentBase64
        }).then(() => {
            Swal.fire('تم!', 'المنتج أصبح متاحاً للجميع الآن', 'success');
            document.getElementById('p-name').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('upload-text').style.display = 'block';
            currentBase64 = "";
            window.switchTab('shop', document.querySelectorAll('.nav-item')[0]);
        }).catch(err => Swal.fire('خطأ', err.message, 'error'));
    };

    // 4. جلب المنتجات وعرضها
    function fetchProducts() {
        const productRef = ref(db, 'products');
        onValue(productRef, (snapshot) => {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            const data = snapshot.val();
            
            if(data) {
                // عكس ترتيب المنتجات ليظهر الجديد أولاً
                Object.keys(data).reverse().forEach(key => {
                    const p = data[key];
                    container.innerHTML += `
                        <div class="product-card">
                            <img src="${p.image}" class="product-img">
                            <h3 class="product-title">${p.name}</h3>
                            <p class="product-desc">${p.desc}</p>
                            <p class="product-price">${p.price} ج.م</p>
                            <button class="btn btn-gold" onclick="window.openWhatsApp('buy', '${p.name}')">طلب المنتج</button>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = '<p style="text-align:center; color:#888;">لا توجد منتجات حالياً.</p>';
            }
        });
    }

    // 5. التنقل والواتساب
    window.switchTab = (tabId, element) => {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
        window.scrollTo(0, 0);
    };

    window.openWhatsApp = (type, item = "") => {
        let msg = "";
        if(type === 'invest') msg = "أهلاً HOMOS، أريد الاستثمار في المنصة.";
        if(type === 'loan') msg = "أهلاً HOMOS، أريد طلب تمويل/قرض.";
        if(type === 'buy') msg = `أهلاً HOMOS، أريد شراء: ${item}`;
        window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
    };
</script>
</body>
</html>
