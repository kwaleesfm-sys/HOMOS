<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS Studio | النسخة النهائية المستقرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .homos-loader {
            width: 48px; height: 48px;
            border: 5px solid #FFF; border-bottom-color: #a78bfa;
            border-radius: 50%; display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glow-effect { box-shadow: 0 0 30px rgba(167, 139, 250, 0.2); }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen font-sans selection:bg-violet-500">

    <nav class="border-b border-white/5 bg-black/40 backdrop-blur-md p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black bg-gradient-to-r from-violet-400 to-cyan-400 bg-clip-text text-transparent">HOMOS.Studio</h1>
            <span class="text-[10px] bg-violet-500/20 text-violet-300 px-2 py-1 rounded border border-violet-500/30 font-mono tracking-tighter">STABLE_MODE_ON</span>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-12">
        <div class="bg-[#0f172a] rounded-3xl p-8 border border-white/5 shadow-2xl glow-effect">
            <div class="space-y-5">
                <textarea id="promptInput" rows="3" 
                    class="w-full bg-[#020617] border border-white/10 rounded-2xl p-4 text-lg outline-none focus:border-violet-500 transition-all placeholder-slate-600"
                    placeholder="اكتب وصف الصورة بالإنجليزية (مثلاً: Cyberpunk Egypt 2077)"></textarea>
                
                <button onclick="startGeneration()" id="mainBtn"
                    class="w-full bg-gradient-to-r from-violet-600 to-cyan-600 hover:from-violet-500 hover:to-cyan-500 py-4 rounded-2xl font-bold text-lg shadow-lg transition-all active:scale-95">
                    توليد الصورة الآن
                </button>
            </div>

            <div id="resultArea" class="mt-10 hidden text-center">
                <div id="loaderBox" class="py-10 bg-black/20 rounded-2xl mb-4">
                    <span class="homos-loader"></span>
                    <p class="mt-4 text-violet-400 animate-pulse text-sm">HOMOS Studio يقوم برسم خيالك... يرجى الانتظار</p>
                </div>
                
                <div class="relative group">
                    <img id="resultImg" src="" 
                        class="hidden w-full rounded-2xl border-2 border-white/5 shadow-2xl" 
                        onload="onImageLoad()" 
                        onerror="onImageError()">
                    
                    <div id="actionButtons" class="hidden mt-6 flex gap-3">
                        <button onclick="downloadImage()" class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl text-sm border border-white/10">حفظ الصورة</button>
                        <button onclick="location.reload()" class="px-6 bg-red-500/10 text-red-400 py-3 rounded-xl text-sm border border-red-500/20">مسح</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function startGeneration() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) return alert("يرجى كتابة وصف أولاً!");

            const btn = document.getElementById('mainBtn');
            const resultArea = document.getElementById('resultArea');
            const loaderBox = document.getElementById('loaderBox');
            const resultImg = document.getElementById('resultImg');
            const actionButtons = document.getElementById('actionButtons');

            // 1. تجهيز الحالة
            btn.disabled = true;
            btn.style.opacity = "0.5";
            resultArea.classList.remove('hidden');
            loaderBox.classList.remove('hidden');
            resultImg.classList.add('hidden');
            actionButtons.classList.add('hidden');

            // 2. بناء الرابط (استخدام موديل flux لضمان الجودة)
            const seed = Math.floor(Math.random() * 9999999);
            const encodedPrompt = encodeURIComponent(prompt);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;

            // 3. وضع الرابط في الصورة مباشرة (المتصفح سيقوم بالتحميل)
            resultImg.src = imageUrl;
        }

        // هذه الدالة تعمل فور اكتمال تحميل الصورة فعلياً
        function onImageLoad() {
            document.getElementById('loaderBox').classList.add('hidden');
            document.getElementById('resultImg').classList.remove('hidden');
            document.getElementById('actionButtons').classList.remove('hidden');
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('mainBtn').style.opacity = "1";
        }

        // هذه الدالة تعمل في حال فشل الرابط تماماً
        function onImageError() {
            alert("عذراً، الخادم يواجه ضغطاً كبيراً. سنحاول مرة أخرى تلقائياً بموديل أسرع.");
            const prompt = document.getElementById('promptInput').value;
            const seed = Math.floor(Math.random() * 1000);
            // محاولة بديلة بموديل أخف (Turbo)
            document.getElementById('resultImg').src = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&seed=${seed}`;
        }

        function downloadImage() {
            const imgSrc = document.getElementById('resultImg').src;
            const link = document.createElement('a');
            link.href = imgSrc;
            link.download = `HOMOS_STUDIO_${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
