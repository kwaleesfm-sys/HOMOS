<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS Studio | منزل الأنماط المتعددة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        homos_bg: '#0f172a',
                        homos_primary: '#a78bfa',
                        homos_secondary: '#22d3ee',
                        homos_card: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        .glow { box-shadow: 0 0 50px -12px rgba(167, 139, 250, 0.3); }
        .image-container img { transition: all 0.5s ease; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        /* أنيميشن لظهور العناصر */
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-homos_bg text-slate-100 min-h-screen font-sans selection:bg-homos_primary selection:text-homos_bg">

    <nav class="border-b border-slate-800 bg-homos_bg/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-homos_primary to-homos_secondary rotate-3 shadow-lg shadow-homos_primary/20"></div>
                <h1 class="text-2xl font-black tracking-tighter">
                    HOMOS<span class="text-homos_secondary text-3xl">.</span>Studio
                </h1>
            </div>
            <div class="hidden md:block text-xs font-mono text-slate-500 bg-slate-900 px-3 py-1 rounded-full border border-slate-800">
                AI ENGINE: POLLINATIONS V2
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-16">
        
        <div class="text-center mb-12 fade-in">
            <h2 class="text-4xl md:text-6xl font-bold mb-4">تخيل، نحن <span class="text-transparent bg-clip-text bg-gradient-to-l from-homos_primary to-homos_secondary">نصنع.</span></h2>
            <p class="text-slate-400 text-lg">أداة HOMOS الذكية لتوليد الصور الفنية مجاناً وبالدقة الكاملة.</p>
        </div>

        <div class="bg-homos_card rounded-3xl p-1 border border-slate-800 shadow-2xl transition-all hover:border-slate-700">
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-3 mr-1">اكتب وصف الصورة بالإنجليزية (لأفضل جودة):</label>
                    <textarea id="promptInput" rows="3" 
                        class="w-full bg-homos_bg border border-slate-700 rounded-2xl px-5 py-4 text-white focus:ring-2 focus:ring-homos_primary outline-none transition duration-300 placeholder-slate-600 shadow-inner"
                        placeholder="e.g. A futuristic Egyptian pyramid made of glass, cinematic lighting, 8k resolution..."></textarea>
                </div>

                <div class="flex flex-wrap gap-3">
                    <button onclick="generateImage()" id="genBtn"
                        class="flex-1 bg-white text-homos_bg font-bold py-4 rounded-2xl hover:bg-homos_primary hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 group">
                        <span id="btnText">توليد الصورة السحرية</span>
                        <svg id="loadingSpinner" class="hidden spinner w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <path d="M21 12a9 9 0 11-6.219-8.56" stroke-linecap="round"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="resultArea" class="mt-12 hidden fade-in">
            <div class="relative group image-container">
                <div class="absolute -inset-1 bg-gradient-to-r from-homos_primary to-homos_secondary rounded-3xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                <div class="relative bg-slate-900 rounded-3xl overflow-hidden border-4 border-slate-950 shadow-2xl">
                    <img id="outputImage" src="" alt="Generated Image" class="w-full h-auto object-cover">
                    
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-6 flex justify-between items-center translate-y-full group-hover:translate-y-0 transition-transform">
                        <span class="text-sm font-medium text-white/80">HOMOS STUDIO GENERATED</span>
                        <button onclick="downloadImage()" class="bg-white/10 hover:bg-white/20 backdrop-blur-md text-white px-4 py-2 rounded-xl text-sm transition border border-white/20">
                            حفظ الصورة ↓
                        </button>
                    </div>
                </div>
            </div>
            <p class="text-center mt-6 text-slate-500 text-sm">ملاحظة: الصور تولد عشوائياً بناءً على الوصف، يمكنك إعادة المحاولة لنفس الوصف للحصول على نتيجة مختلفة.</p>
        </div>

    </main>

    <footer class="py-12 text-center text-slate-600 border-t border-slate-900/50 mt-10">
        <p class="text-xs tracking-widest uppercase">© 2026 HOMOS CREATIVE LABS</p>
    </footer>

    <script>
        async function generateImage() {
            const prompt = document.getElementById('promptInput').value;
            const btn = document.getElementById('genBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const resultArea = document.getElementById('resultArea');
            const outputImg = document.getElementById('outputImage');

            if (!prompt) {
                alert('من فضلك اكتب وصفاً أولاً!');
                return;
            }

            // تفعيل حالة التحميل
            btn.disabled = true;
            btnText.innerText = 'جاري الرسم...';
            spinner.classList.remove('hidden');
            
            // إنشاء رابط الصورة
            // نستخدم seed عشوائي لضمان عدم تكرار الصورة إذا كان الوصف نفسه
            const randomSeed = Math.floor(Math.random() * 1000000);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${randomSeed}&width=1024&height=1024&nologo=true`;

            // تحميل الصورة مسبقاً قبل عرضها لتجنب الرمش (Flicker)
            const img = new Image();
            img.src = imageUrl;
            img.onload = () => {
                outputImg.src = imageUrl;
                resultArea.classList.remove('hidden');
                
                // إعادة الزر لحالته
                btn.disabled = false;
                btnText.innerText = 'توليد صورة أخرى';
                spinner.classList.add('hidden');
                
                // التمرير التلقائي للصورة
                resultArea.scrollIntoView({ behavior: 'smooth' });
            };
        }

        function downloadImage() {
            const imgSrc = document.getElementById('outputImage').src;
            const link = document.createElement('a');
            link.href = imgSrc;
            link.download = `HOMOS_Studio_${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
