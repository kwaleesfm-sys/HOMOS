<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS LUXURY | الإمبراطورية الذهبية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --gold: #FFD700;
            --gold-dark: #B8860B;
            --bg: #050505;
            --card-bg: #111111;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* خلفية متحركة خفيفة */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background: radial-gradient(circle, #1a1a00 0%, #050505 70%);
            z-index: -1;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #111, transparent);
        }

        .brand-name {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--gold), #fff, var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
        }

        .tagline { color: #888; letter-spacing: 2px; font-size: 0.9rem; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* الأقسام المالية */
        .finance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .f-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .f-card::after {
            content: "";
            position: absolute;
            top: 0; right: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.1), transparent);
            transition: 0.5s;
        }

        .f-card:hover::after { right: 100%; }

        h2.gold-title {
            color: var(--gold);
            font-size: 1.8rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--gold);
            display: inline-block;
        }

        /* المتجر الذكي */
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid #222;
        }

        .product-item:hover {
            border-color: var(--gold);
            transform: scale(1.03);
        }

        .img-box {
            width: 100%;
            height: 250px;
            background: #222;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .btn-main {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
        }

        .btn-main:active { transform: scale(0.95); }

        /* لوحة التحكم المخفية */
        #adminPanel {
            display: none;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            margin-top: 50px;
            border: 2px dashed var(--gold);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
        }

        .admin-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #444;
            border-radius: 50%;
            width: 40px; height: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1 class="brand-name">HOMOS</h1>
    <div class="tagline">WORLDWIDE LUXURY TRADING & INVESTMENTS</div>
</header>

<div class="container">
    
    <div class="finance-grid">
        <div class="f-card">
            <h2 class="gold-title">🏦 استثمر مع HOMOS</h2>
            <p>حوّل مدخراتك إلى أسهم رابحة في أكبر دورة تجارية تقنية.</p>
            <button class="btn-main" onclick="action('invest')">ابدأ الاستثمار الآن</button>
        </div>
        <div class="f-card">
            <h2 class="gold-title">💳 تمويل المشتريات</h2>
            <p>قروض فورية وتقسيط بضمان البطاقة لأي منتج تريده.</p>
            <button class="btn-main" style="background: transparent; border: 2px solid var(--gold); color: var(--gold);" onclick="action('loan')">اطلب تمويلك</button>
        </div>
    </div>

    <div class="shop-header">
        <h2 style="font-size: 2rem;">المتجر الحصري</h2>
        <span id="clock" style="color: var(--gold);"></span>
    </div>

    <div class="grid" id="mainGrid">
        </div>

    <div id="adminPanel">
        <h2 style="color: var(--gold);">إضافة منتج جديد لـ HOMOS</h2>
        <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="number" id="pPrice" placeholder="السعر">
        <input type="text" id="pEmoji" placeholder="أيقونة أو رابط صورة">
        <button class="btn-main" onclick="addProduct()">نشر في المتجر</button>
    </div>

</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<div style="text-align: center; padding: 50px; color: #444;">
    HOMOS GLOBAL HOLDINGS © 2026 | EL MAHALLA EL KUBRA
</div>

<script>
    // الرقم الخاص بـ HOMOS
    const WHATSAPP_NUMBER = "201016553764";

    // بيانات المنتجات الأولية
    let products = JSON.parse(localStorage.getItem('homos_products')) || [
        { name: "PS5 Custom Edition", price: "35,000", emoji: "🎮" },
        { name: "iPhone 17 Pro Max", price: "75,000", emoji: "📱" }
    ];

    function renderProducts() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        products.forEach((p, index) => {
            grid.innerHTML += `
                <div class="product-item">
                    <div class="img-box">${p.emoji}</div>
                    <h3 style="margin: 10px 0;">${p.name}</h3>
                    <p style="color: var(--gold); font-size: 1.3rem; font-weight: bold;">${p.price} ج.م</p>
                    <button class="btn-main" onclick="action('buy', '${p.name}')">شراء عبر واتساب</button>
                </div>
            `;
        });
    }

    function action(type, detail = "") {
        let msg = "";
        if(type === 'invest') msg = "أهلاً HOMOS، أريد مناقشة شراء أسهم استثمارية في مشروعك.";
        if(type === 'loan') msg = "أهلاً HOMOS، أريد الحصول على قرض/تمويل بضمان البطاقة.";
        if(type === 'buy') msg = `أهلاً HOMOS، أريد طلب شراء المنتج: ${detail}`;
        
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function openAdmin() {
        Swal.fire({
            title: 'دخول الإدارة',
            input: 'password',
            inputPlaceholder: 'كلمة السر يا حمص',
            showCancelButton: true
        }).then((result) => {
            if (result.value === "HOMOS2026") { // كلمة السر هنا
                document.getElementById('adminPanel').style.display = 'block';
                window.scrollTo(0, document.body.scrollHeight);
            } else if(result.value) {
                Swal.fire('خطأ', 'كلمة السر غلط يا بطل', 'error');
            }
        });
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const emoji = document.getElementById('pEmoji').value;

        if(name && price) {
            products.push({ name, price, emoji });
            localStorage.setItem('homos_products', JSON.stringify(products));
            renderProducts();
            document.getElementById('adminPanel').style.display = 'none';
            Swal.fire('تم!', 'المنتج نزل المتجر بنجاح', 'success');
        }
    }

    // الساعة
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG');
    }, 1000);

    renderProducts();
</script>

</body>
</html>
