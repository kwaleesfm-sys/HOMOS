<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOMOS Studio | المحرك فائق القوة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .homos-spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(167, 139, 250, 0.2);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .glow { box-shadow: 0 0 40px -10px rgba(167, 139, 250, 0.3); }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 min-h-screen font-sans selection:bg-violet-500">

    <nav class="border-b border-white/5 bg-black/40 backdrop-blur-md p-5 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black bg-gradient-to-r from-violet-400 to-cyan-400 bg-clip-text text-transparent italic">HOMOS STUDIO</h1>
            <span class="text-[10px] bg-green-500/20 text-green-400 px-3 py-1 rounded-full border border-green-500/30 font-mono tracking-widest">SERVER_ACTIVE</span>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-12">
        <div class="bg-[#0f172a] rounded-[2.5rem] p-8 border border-white/5 shadow-2xl glow">
            <div class="space-y-6">
                <textarea id="promptInput" rows="3" 
                    class="w-full bg-[#030712] border border-white/10 rounded-2xl p-5 text-lg outline-none focus:border-violet-500 transition-all placeholder-slate-600 shadow-inner"
                    placeholder="اكتب وصف الصورة (مثلاً: Futuristic Egyptian Pharaoh in 2077)"></textarea>
                
                <button onclick="generate()" id="genBtn"
                    class="w-full bg-white text-black font-black py-5 rounded-2xl text-xl hover:bg-violet-400 hover:scale-[1.02] active:scale-95 transition-all shadow-xl shadow-violet-500/10">
                    ارسم الآن بقوة HOMOS
                </button>
            </div>

            <div id="statusArea" class="mt-12 hidden text-center space-y-6">
                <div id="loader" class="flex flex-col items-center gap-4 py-10">
                    <div class="homos-spinner"></div>
                    <p class="text-violet-400 font-bold animate-pulse">جاري سحب البيانات من السحاب... يرجى الانتظار</p>
                </div>
                
                <div id="imgContainer" class="hidden animate-in fade-in duration-700">
                    <img id="outputImg" class="w-full rounded-3xl border-4 border-black shadow-2xl overflow-hidden shadow-violet-500/20">
                    <div class="mt-8 grid grid-cols-2 gap-4">
                        <button onclick="download()" class="bg-violet-600 hover:bg-violet-500 py-4 rounded-2xl font-bold text-sm">حفظ في الجهاز</button>
                        <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold text-sm">محاولة أخرى</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function generate() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) return alert("اكتب وصفاً أولاً!");

            const btn = document.getElementById('genBtn');
            const statusArea = document.getElementById('statusArea');
            const loader = document.getElementById('loader');
            const imgContainer = document.getElementById('imgContainer');
            const outputImg = document.getElementById('outputImg');

            // 1. واجهة المستخدم
            btn.disabled = true;
            btn.innerText = "جاري الاتصال...";
            statusArea.classList.remove('hidden');
            loader.classList.remove('hidden');
            imgContainer.classList.add('hidden');

            try {
                // 2. بناء الرابط بـ Seed عشوائي وموديل سريع
                const seed = Math.floor(Math.random() * 1000000);
                const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=768&height=768&seed=${seed}&nologo=true&model=flux`;

                // 3. الحل العبقري: جلب الصورة كـ Blob لمنع أخطاء الخادم
                const response = await fetch(url);
                if (!response.ok) throw new Error('Server busy');
                
                const blob = await response.blob();
                const objectURL = URL.createObjectURL(blob);

                // 4. عرض الصورة
                outputImg.src = objectURL;
                loader.classList.add('hidden');
                imgContainer.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "ارسم الآن بقوة HOMOS";

            } catch (error) {
                console.error(error);
                alert("الخادم مشغول جداً حالياً، سأحولك الآن لمحرك احتياطي فوري...");
                // محرك احتياطي سريع جداً (Turbo)
                const seed = Math.floor(Math.random() * 1000);
                outputImg.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?model=turbo&seed=${seed}`;
                loader.classList.add('hidden');
                imgContainer.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "ارسم الآن بقوة HOMOS";
            }
        }

        function download() {
            const imgSrc = document.getElementById('outputImg').src;
            const a = document.createElement('a');
            a.href = imgSrc;
            a.download = `HOMOS_Studio_${Date.now()}.png`;
            a.click();
        }
    </script>
</body>
</html>
