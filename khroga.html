<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبرة | تجربة فورية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body {
            background: linear-gradient(135deg, #1a052e, #4a2a8a, #0d7a70);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 90%; max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { font-size: 3rem; margin-bottom: 5px; background: linear-gradient(to right, #fff, #38ef7d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { margin-bottom: 30px; opacity: 0.8; }
        textarea {
            width: 100%; height: 150px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; padding: 15px;
            color: white; font-size: 1.1rem; outline: none; transition: 0.3s; resize: none;
        }
        textarea:focus { border-color: #38ef7d; background: rgba(255, 255, 255, 0.12); }
        button {
            width: 100%; padding: 18px; margin-top: 20px;
            background: linear-gradient(90deg, #11998e, #38ef7d);
            border: none; border-radius: 15px;
            color: #000; font-size: 1.3rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        button:disabled { background: #555; cursor: not-allowed; color: #ccc; }
        audio { width: 100%; margin-top: 25px; display: none; filter: invert(100%); }
        .footer { margin-top: 20px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>نبرة</h1>
        <p>الجيل القادم من تحويل النص إلى صوت</p>
        
        <textarea id="txt" placeholder="اكتب نصك هنا باللغة العربية..."></textarea>
        
        <button id="btn" onclick="speak()">توليد الصوت الآن ⚡</button>
        
        <audio id="player" controls></audio>
        
        <div class="footer">هوية "نبرة" - تجربة حية بنمط Glassmorphism</div>
    </div>

    <script>
        async function speak() {
            const text = document.getElementById('txt').value;
            const btn = document.getElementById('btn');
            const player = document.getElementById('player');

            // ضع مفتاحك هنا للتجربة فقط
            const API_KEY = "99a5173bc848626f46041b2ba5512962b33cf141e5159a62b46fc492b477e1df";
            const VOICE_ID = "ErXwWCcSX9778PV7W9Y2"; // صوت احترافي

            if (!text) return alert("اكتب شيئاً أولاً!");

            btn.disabled = true;
            btn.innerText = "جاري التوليد...";

            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                    method: 'POST',
                    headers: {
                        'xi-api-key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                    })
                });

                if (!response.ok) throw new Error("خطأ في الاتصال");

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                player.src = url;
                player.style.display = "block";
                player.play();

            } catch (err) {
                alert("حدث خطأ: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "توليد الصوت الآن ⚡";
            }
        }
    </script>
</body>
</html>
